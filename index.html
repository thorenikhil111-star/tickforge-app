<!DOCTYPE html>
<html>
<head>
    <title>TickForge AI - by Nikhil</title>
    <style>
        body { background: #050505; color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 10px; font-size: 12px; }
        .topbar { background: #0d1117; padding: 10px; display: flex; align-items: center; border-bottom: 1px solid #1f2937; margin-bottom: 10px;}
        .brand { font-weight: bold; color: #2f81f7; font-size: 16px; margin-right: 20px;}
        .tape { display: flex; gap: 15px; flex: 1; }
        .green { color: #2ea043; } .red { color: #f85149; }
        .logout { color: #f85149; text-decoration: none; border: 1px solid #f85149; padding: 4px 8px; border-radius: 4px;}
        
        .main { display: flex; gap: 10px; height: 85vh; }
        .left { flex: 1; background: #0d1117; padding: 10px; border: 1px solid #1f2937; border-radius: 4px; overflow-y: auto; }
        .right { flex: 3; background: #010409; border: 1px solid #1f2937; border-radius: 4px;}
        .alert { border-bottom: 1px solid #1f2937; padding: 10px 0; cursor: pointer; }
        .alert:hover { background: #161b22; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="brand">TickForge AI <br><span style="color:white; font-size:10px;">BY NIKHIL</span></div>
        <div class="tape" id="tape">Loading Data...</div>
        <a href="/logout" class="logout">Logout</a>
    </div>
    
    <div class="main">
        <div class="left">
            <h3 style="margin-top:0; color:#8b949e;">PRO SCANNERS</h3>
            <div id="alerts">Waiting for Setups...</div>
        </div>
        <div class="right">
            <iframe id="chart" src="https://s.tradingview.com/widgetembed/?symbol=AAPL&interval=1&theme=dark" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <script>
        function changeChart(symbol) {
            document.getElementById('chart').src = `https://s.tradingview.com/widgetembed/?symbol=${symbol}&interval=1&theme=dark`;
        }

        async function loadData() {
            try {
                let res = await fetch('/api/data');
                let data = await res.json();
                
                // Tape Update
                let tapeHtml = "";
                data.indices.forEach(i => tapeHtml += `<b class="${i.change > 0 ? 'green':'red'}">${i.symbol} ${i.price}</b> `);
                data.market.forEach(s => tapeHtml += `<span class="${s.change > 0 ? 'green':'red'}">${s.symbol} ${s.price}</span> `);
                document.getElementById('tape').innerHTML = tapeHtml;

                // Alerts Update
                let alertHtml = "";
                data.alerts.forEach(a => {
                    let c = a.direction === 'LONG' ? 'green' : 'red';
                    alertHtml += `<div class="alert" onclick="changeChart('${a.ticker}')">
                        <strong style="color:var(--${c})">${a.ticker} [${a.direction}]</strong> 
                        <span style="float:right; color:#888;">${a.time}</span><br>
                        <div style="margin: 4px 0;">${a.setup}</div>
                        <span style="color:#888;">In: ${a.entry} | Tgt: <span style="color:var(--green)">${a.target}</span></span>
                    </div>`;
                });
                document.getElementById('alerts').innerHTML = alertHtml;
            } catch(e) {}
        }
        setInterval(loadData, 3000);
        loadData();
    </script>
</body>
</html>
